<div class="create-gnome-container">

  <h2>Create Gnome</h2>

  <form (ngSubmit)="createGnome()">

    <label>Username</label>
    <input
      type="text"
      [(ngModel)]="username"
      name="username"
      required
    />

    <label>Display Name</label>
    <input
      type="text"
      [(ngModel)]="displayName"
      name="displayName"
      required
    />

    <button type="submit" [disabled]="loading">
      {{ loading ? 'Creating...' : 'Create Gnome' }}
    </button>

  </form>

    @if (error){
        <p  style="color:red;">
            {{ error }}
        </p>
    }   
  

</div>
