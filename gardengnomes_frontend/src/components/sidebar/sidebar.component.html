<div
  class="h-screen bg-gray-900 text-white transition-all duration-300 flex flex-col"
  [class.w-64]="!collapsed"
  [class.w-20]="collapsed"
>
  <!-- Header -->
  <div class="flex items-center justify-between p-4 border-b border-gray-700">
    @if (!collapsed) {
      <span class="text-xl font-bold whitespace-nowrap">
        Admin Panel
      </span>
    }

    <button
      (click)="toggleSidebar()"
      class="p-2 rounded hover:bg-gray-700 transition"
    >
      @if (collapsed) {
        →
      } @else {
        ←
      }
    </button>
  </div>


  <!-- Menu -->
  <nav class="flex-1 p-3 space-y-2">
    @for (item of menuItems; track item.route) {
      <a
        [routerLink]="item.route"
        class="flex items-center gap-3 p-3 rounded-lg hover:bg-gray-700 transition"
      >
        <span class="text-xl">
          {{ item.icon }}
        </span>

        @if (!collapsed) {
          <span class="whitespace-nowrap">
            {{ item.label }}
          </span>
        }
      </a>
    }
  </nav>


  <!-- Footer -->
  <div class="p-4 text-sm text-gray-400">
    @if (!collapsed) {
      v1.0
    }
  </div>
</div>
